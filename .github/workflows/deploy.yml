name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Push clean backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://AhmadDurrani:$HF_TOKEN@huggingface.co/spaces/AhmadYarAI/MZ-Essence space

          rsync -av --delete \
            --exclude '.git/' \
            --exclude 'venv/' \
            --exclude '.env' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            backend/ space/

          cd space
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"

          git add -A
          git commit -m "Deploy backend from GitHub" || echo "No changes to commit"
          git push origin main